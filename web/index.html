<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SUPERBACK">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SUPERBACK">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SUPERBACK</title>
  <script>
    (function () {
      const savedClientId = window.localStorage.getItem('superback_google_client_id') || '';
      const meta = document.createElement('meta');
      meta.name = 'google-signin-client_id';
      meta.content = savedClientId || 'INSERISCI_QUI_IL_CLIENT_ID_WEB.apps.googleusercontent.com';
      document.head.appendChild(meta);
    })();
  </script>

</head>
<body>
  <script>
    const PHBOX_APP_VERSION = '__APP_VERSION__';

    async function bootstrapPhbox() {
      if ('serviceWorker' in navigator) {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.unregister();
          }
        } catch (_) {}
      }

      if ('caches' in window) {
        try {
          const cacheKeys = await caches.keys();
          await Promise.all(cacheKeys.map((key) => caches.delete(key)));
        } catch (_) {}
      }

      const script = document.createElement('script');
      script.src = `flutter_bootstrap.js?v=${encodeURIComponent(PHBOX_APP_VERSION)}`;
      script.async = true;
      document.body.appendChild(script);
    }

    bootstrapPhbox();
  </script>
</body>
</html>
